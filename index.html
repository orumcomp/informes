  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:460px;
    background:rgba(255,255,255,0.94);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px 28px;
    backdrop-filter:blur(1px);
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin:0 0 6px;
  }
  h1{
    font-size:21px;
    margin:0 0 24px;
    font-weight:600;
    line-height:1.3;
  }
  .progress{
    display:flex;
    gap:6px;
    margin-bottom:28px;
  }
  .progress span{
    height:3px;
    flex:1;
    background:var(--line);
    border-radius:2px;
    transition:background .2s;
  }
  .progress span.done{background:var(--accent);}
  .step{display:none;}
  .step.active{display:block;}
  label{
    display:block;
    font-size:14px;
    font-weight:600;
    margin-bottom:8px;
    color:var(--ink);
  }
  .field{margin-bottom:18px;}
  input[type=text], input[type=number], select{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:16px;
    background:#fff;
    color:var(--ink);
  }
  .static-box{
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#f6f4ee;
    font-size:15px;
    font-weight:600;
  }
  input:focus, select:focus, button:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .option-btn{
    text-align:left;
    padding:14px 16px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fff;
    font-size:15px;
    color:var(--ink);
    cursor:pointer;
  }
  .option-btn:hover{border-color:var(--accent);}
  .option-btn.selected{
    border-color:var(--accent);
    background:#eef5f2;
    color:var(--accent-dark);
    font-weight:600;
  }
  .primary-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
  }
  .primary-btn:disabled{
    background:#b7c7c1;
    cursor:not-allowed;
  }
  .primary-btn:hover:not(:disabled){background:var(--accent-dark);}
  .hint{
    font-size:13px;
    color:var(--muted);
    margin:-8px 0 18px;
  }
  .error-box{
    background:#fbeae6;
    color:var(--error);
    border:1px solid #f0c9bd;
    border-radius:8px;
    padding:10px 12px;
    font-size:13px;
    margin-bottom:16px;
    display:none;
  }
  .center-msg{
    text-align:center;
    padding:20px 0;
  }
  .center-msg .icon{
    width:48px;height:48px;
    border-radius:50%;
    background:#eef5f2;
    color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;
    font-size:24px;
  }
  .center-msg h2{
    font-size:18px;
    margin:0 0 8px;
  }
  .center-msg p{
    color:var(--muted);
    font-size:14px;
    line-height:1.6;
    margin:0;
  }
  .spinner{
    width:18px;height:18px;
    border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;
    border-radius:50%;
    display:inline-block;
    animation:spin .7s linear infinite;
    vertical-align:middle;
    margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg-photo"></div>

<div class="card">
  <p class="eyebrow">Congregación López Camelo</p>
  <h1 id="title">Informe mensual de predicación</h1>
  <div class="progress" id="progress"></div>

  <div class="error-box" id="errorBox"></div>

  <!-- Paso: login -->
  <div class="step active" data-step="login">
    <div class="field">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" autocomplete="given-name">
    </div>
    <div class="field">
      <label for="apellido">Apellido</label>
      <input type="text" id="apellido" autocomplete="family-name">
    </div>
    <button class="primary-btn" id="btnLogin" onclick="buscarGrupo()">Continuar</button>
  </div>

  <!-- Paso: periodo fijo (mes anterior) -->
  <div class="step" data-step="periodo">
    <p class="hint" id="grupoHint"></p>
    <div class="field">
      <label>Período a informar</label>
      <div class="static-box" id="periodoDisplay"></div>
    </div>
    <p class="hint">¿Necesitás informar un período anterior a este? Hablá con tu Superintendente de grupo.</p>
    <button class="primary-btn" id="btnVerificar" onclick="verificarInforme()">Continuar</button>
  </div>

  <!-- Paso: ya informado -->
  <div class="step" data-step="yaInformado">
    <label>Ya informaste tu actividad de este período</label>
    <p class="hint" id="yaInformadoMsg"></p>
    <div class="options">
      <button class="option-btn" onclick="elegirModificar(true)">Sí, quiero modificarlo</button>
      <button class="option-btn" onclick="elegirModificar(false)">No, ya está bien así</button>
    </div>
  </div>

  <!-- Paso: tuvo actividad -->
  <div class="step" data-step="actividad">
    <label>¿Realizaste actividad de predicación este mes?</label>
    <div class="options">
      <button class="option-btn" onclick="setActividad(true)">Sí, prediqué</button>
      <button class="option-btn" onclick="setActividad(false)">No tuve actividad</button>
    </div>
  </div>

  <!-- Paso: tipo de actividad -->
  <div class="step" data-step="tipo">
    <label>¿Qué actividad realizaste?</label>
    <div class="options" id="tipoActividadOpts">
      <button class="option-btn" data-val="Predico" onclick="setTipo('Predico')">Prediqué</button>
      <button class="option-btn" data-val="Precursor auxiliar 15h" onclick="setTipo('Precursor auxiliar 15h')">Precursor auxiliar (15 h)</button>
      <button class="option-btn" data-val="Precursor auxiliar 30h" onclick="setTipo('Precursor auxiliar 30h')">Precursor auxiliar (30 h)</button>
      <button class="option-btn" data-val="Precursor regular" onclick="setTipo('Precursor regular')">Precursor regular</button>
    </div>
  </div>

  <!-- Paso: solo predico -> estudios -->
  <div class="step" data-step="detalleA">
    <div class="field">
      <label for="estudiosA">Cantidad de estudios bíblicos</label>
      <input type="number" id="estudiosA" min="0" value="0">
    </div>
    <button class="primary-btn" onclick="enviarInforme()">Enviar informe</button>
  </div>

  <!-- Paso: precursor -> horas + estudios -->
  <div class="step" data-step="detalleB">
    <div class="field">
      <label for="horasB">Horas realizadas</label>
      <input type="number" id="horasB" min="0" step="0.5">
    </div>
    <div class="field">
      <label for="estudiosB">Cantidad de estudios bíblicos</label>
      <input type="number" id="estudiosB" min="0" value="0">
    </div>
    <button class="primary-btn" onclick="enviarInforme()">Enviar informe</button>
  </div>

  <!-- Paso final -->
  <div class="step" data-step="fin">
    <div class="center-msg">
      <div class="icon">✓</div>
      <h2 id="finTitle">¡Gracias por tu informe!</h2>
      <p id="finMsg">Tu actividad quedó registrada correctamente.</p>
    </div>
  </div>

</div>

<script>
// ======= CONFIGURACIÓN: reemplazar con las URLs reales de tus webhooks de N8N =======
const WEBHOOK_LOGIN_URL     = "https://gmaldonadoit.app.n8n.cloud/webhook/predicacion-login";
const WEBHOOK_VERIFICAR_URL = "https://gmaldonadoit.app.n8n.cloud/webhook/predicacion-verificar";
const WEBHOOK_INFORME_URL   = "https://gmaldonadoit.app.n8n.cloud/webhook/predicacion-informe";
// =====================================================================================

const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const totalStages = 5;
const stageIndex = { login:0, periodo:1, yaInformado:1, actividad:2, tipo:3, detalleA:4, detalleB:4, fin:5 };

let data = { nombre:"", apellido:"", grupo:"", periodo:"", tuvoActividad:null, tipoActividad:"", horas:"", estudios:0, esCorreccion:false };

function periodoMesAnterior(){
  const hoy = new Date();
  const d = new Date(hoy.getFullYear(), hoy.getMonth()-1, 1);
  return MESES[d.getMonth()] + " " + d.getFullYear();
}

function renderProgress(activeIndex){
  const bar = document.getElementById("progress");
  bar.innerHTML = "";
  for(let i=0;i<totalStages;i++){
    const s = document.createElement("span");
    if(i <= activeIndex) s.classList.add("done");
    bar.appendChild(s);
  }
}

function showStep(name){
  document.querySelectorAll(".step").forEach(el => el.classList.remove("active"));
  document.querySelector(`.step[data-step="${name}"]`).classList.add("active");
  renderProgress(stageIndex[name] ?? 0);
  hideError();
}

function showError(msg){
  const box = document.getElementById("errorBox");
  box.textContent = msg;
  box.style.display = "block";
}
function hideError(){
  document.getElementById("errorBox").style.display = "none";
}

async function buscarGrupo(){
  const nombre = document.getElementById("nombre").value.trim();
  const apellido = document.getElementById("apellido").value.trim();
  if(!nombre || !apellido){
    showError("Completá nombre y apellido para continuar.");
    return;
  }
  const btn = document.getElementById("btnLogin");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Buscando...';
  try{
    const res = await fetch(WEBHOOK_LOGIN_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({nombre, apellido})
    });
    const json = await res.json();
    if(!json.encontrado){
      showError("No te encontramos en el listado. Consultá con tu superintendente de grupo.");
      btn.disabled = false;
      btn.textContent = "Continuar";
      return;
    }
    data.nombre = nombre;
    data.apellido = apellido;
    data.grupo = json.grupo;
    data.periodo = periodoMesAnterior();
    document.getElementById("grupoHint").textContent = `Hola ${nombre}, perteneces a ${json.grupo}.`;
    document.getElementById("periodoDisplay").textContent = data.periodo;
    showStep("periodo");
  }catch(e){
    showError("No pudimos conectar con el servidor. Probá de nuevo en un momento.");
  }finally{
    btn.disabled = false;
    btn.textContent = "Continuar";
  }
}

async function verificarInforme(){
  const btn = document.getElementById("btnVerificar");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verificando...';
  try{
    const res = await fetch(WEBHOOK_VERIFICAR_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ nombre: data.nombre, apellido: data.apellido, grupo: data.grupo, periodo: data.periodo })
    });
    const json = await res.json();
    if(json.yaInformado){
      document.getElementById("yaInformadoMsg").textContent = `Ya hay un informe cargado a tu nombre para ${data.periodo}.`;
      showStep("yaInformado");
    }else{
      data.esCorreccion = false;
      showStep("actividad");
    }
  }catch(e){
    showError("No pudimos conectar con el servidor. Probá de nuevo en un momento.");
  }finally{
    btn.disabled = false;
    btn.textContent = "Continuar";
  }
}

function elegirModificar(quiere){
  if(quiere){
    data.esCorreccion = true;
    showStep("actividad");
  }else{
    document.getElementById("finTitle").textContent = "¡Todo en orden!";
    document.getElementById("finMsg").textContent = `Tu informe de ${data.periodo} ya estaba registrado. ¡Gracias!`;
    showStep("fin");
  }
}

function setActividad(valor){
  data.tuvoActividad = valor;
  if(valor){
    showStep("tipo");
  }else{
    enviarInforme();
  }
}

function setTipo(valor){
  data.tipoActividad = valor;
  document.querySelectorAll('#tipoActividadOpts .option-btn').forEach(b=>{
    b.classList.toggle('selected', b.dataset.val===valor);
  });
  if(valor === "Predico"){
    showStep("detalleA");
  }else{
    showStep("detalleB");
  }
}

async function enviarInforme(){
  if(data.tuvoActividad){
    if(data.tipoActividad === "Predico"){
      data.horas = "";
      data.estudios = document.getElementById("estudiosA").value || 0;
    }else{
      const horas = document.getElementById("horasB").value;
      if(!horas){
        showError("Ingresá las horas realizadas.");
        return;
      }
      data.horas = horas;
      data.estudios = document.getElementById("estudiosB").value || 0;
    }
  }

  try{
    await fetch(WEBHOOK_INFORME_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });
  }catch(e){
    // igual mostramos agradecimiento; si hace falta, agregar manejo de error aquí
  }

  if(data.esCorreccion){
    document.getElementById("finTitle").textContent = "¡Informe corregido!";
    document.getElementById("finMsg").textContent = `Corregimos tu informe de ${data.periodo}. Por favor avisale a tu Superintendente de grupo que modificaste esta línea.`;
  }else{
    document.getElementById("finTitle").textContent = "¡Gracias por tu informe!";
    document.getElementById("finMsg").textContent = data.tuvoActividad
      ? "Tu actividad quedó registrada correctamente."
      : "Quedó registrado que no tuviste actividad este mes.";
  }
  showStep("fin");
}
</script>
</body>
</html>
